name: Send Judgment Card to Lark

on:
  push:
    paths:
      - 'data/form-judgment.json'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Lark Token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.LARK_APP_ID }}\",\"app_secret\":\"${{ secrets.LARK_APP_SECRET }}\"}")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Send Judgment Card to Lark
        run: |
          python3 << 'PYEOF'
          import json, urllib.request

          with open('data/form-judgment.json') as f:
            data = json.load(f)

          form = data.get('form', {})
          judgments = data.get('judgments', {})

          def jtext(field):
            jd = judgments.get(field)
            if not jd: return '_Chưa có đánh giá_'
            score = jd.get('score', '')
            summary = jd.get('summary', '')
            items = jd.get('items', '')
            return f"**{score}**\n{items}\n_{summary}_"

          elements = [
            {"tag": "markdown", "content": "## 📋 Hypothesis Card — Form + Judgment"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Segment:** {form.get('segment','—')}\n**Contact:** {form.get('contact_point','—')}\n**Confidence:** {form.get('confidence','—')}/5"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Vấn đề họ gặp:**\n{form.get('problem','—')}\n\n🤖 {jtext('problem')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Offer:**\n{form.get('offer','—')}\n\n🤖 {jtext('offer')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Signal / Evidence:**\n{form.get('signal','—')}\n\n🤖 {jtext('signal')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Assumption:**\n{form.get('assumption','—')}\n\n🤖 {jtext('assumption')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Worst case reject:**\n{form.get('reject_reason','—')}"},
          ]

          card = json.dumps({
            "schema": "2.0",
            "body": {"direction": "vertical", "elements": elements}
          })

          payload = json.dumps({
            "receive_id": "${{ secrets.LARK_CHAT_ID }}",
            "msg_type": "interactive",
            "content": card
          }).encode()

          req = urllib.request.Request(
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id",
            data=payload,
            headers={
              "Authorization": "Bearer ${{ steps.token.outputs.token }}",
              "Content-Type": "application/json"
            }
          )
          res = urllib.request.urlopen(req).read().decode()
          print("Card sent:", res)
          PYEOF
