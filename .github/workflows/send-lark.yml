name: Send Judgment Card to Lark
on:
  push:
    paths:
      - 'data/form-judgment.json'
      - 'data/ai-research.json'
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: changes
        run: |
          echo "judgment=$(git diff --name-only HEAD~1 HEAD | grep -c 'data/form-judgment.json')" >> $GITHUB_OUTPUT
          echo "research=$(git diff --name-only HEAD~1 HEAD | grep -c 'data/ai-research.json')" >> $GITHUB_OUTPUT

      - name: Get Lark Token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.LARK_APP_ID }}\",\"app_secret\":\"${{ secrets.LARK_APP_SECRET }}\"}")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Send Judgment Card to Lark
        if: steps.changes.outputs.judgment != '0'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('data/form-judgment.json') as f:
            data = json.load(f)
          form = data.get('form', {})
          judgments = data.get('judgments', {})
          timestamp = data.get('timestamp', '')[:10]

          def score_bar(score_str):
            try:
              num, den = score_str.split('/')
              filled = int(num)
              total = int(den)
              bar = '🟢' * filled + '⚪' * (total - filled)
              return f"{bar} {score_str}"
            except:
              return score_str

          def jblock(field):
            jd = judgments.get(field)
            if not jd:
              return '_Chưa có đánh giá_'
            score = score_bar(jd.get('score', ''))
            items_raw = jd.get('items', '')
            items_list = [i.strip() for i in items_raw.split('|') if i.strip()]
            items_fmt = '\n'.join([f"• {i}" for i in items_list])
            summary = jd.get('summary', '')
            return f"**🤖 AI Judgment: {score}**\n{items_fmt}\n\n_{summary}_"

          confidence = form.get('confidence', '—')
          try:
            conf_bar = '🟦' * int(confidence) + '⬜' * (5 - int(confidence))
          except:
            conf_bar = ''

          elements = [
            {"tag": "markdown", "content": f"## 📋 Hypothesis Card — Form + Judgment\n_{timestamp}_"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"🏷 **Segment:** {form.get('segment','—')}\n👤 **Contact:** {form.get('contact_point','—')}\n📊 **Confidence:** {conf_bar} {confidence}/5"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🔍 Vấn đề họ gặp\n{form.get('problem','—')}\n\n{jblock('problem')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🎯 Offer\n{form.get('offer','—')}\n\n{jblock('offer')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 📡 Signal / Evidence\n{form.get('signal','—')}\n\n{jblock('signal')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🧠 Assumption\n{form.get('assumption','—')}\n\n{jblock('assumption')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### ⚠️ Worst case reject\n{form.get('reject_reason','—')}"},
          ]
          card = json.dumps({
            "schema": "2.0",
            "body": {"direction": "vertical", "elements": elements}
          })
          payload = json.dumps({
            "receive_id": "${{ secrets.LARK_CHAT_ID }}",
            "msg_type": "interactive",
            "content": card
          }).encode()
          req = urllib.request.Request(
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id",
            data=payload,
            headers={
              "Authorization": "Bearer ${{ steps.token.outputs.token }}",
              "Content-Type": "application/json"
            }
          )
          res = urllib.request.urlopen(req).read().decode()
          print("Judgment Card sent:", res)
          PYEOF

      - name: Send AI Research Card to Lark
        if: steps.changes.outputs.research != '0'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('data/ai-research.json') as f:
            data = json.load(f)

          confidence = data.get('confidence_score', '—')
          try:
            conf_bar = '🟦' * int(confidence) + '⬜' * (5 - int(confidence))
          except:
            conf_bar = ''

          elements = [
            {"tag": "markdown", "content": "## 🤖 AI Research Card — n8n Data"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"🏷 **Segment:** {data.get('segment','—')}\n👤 **Contact:** {data.get('contact_point','—')}\n📊 **Confidence:** {conf_bar} {confidence}/5"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🔍 Vấn đề họ gặp\n{data.get('problem','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🎯 Offer\n{data.get('offer','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 📡 Signal / Evidence\n{data.get('signal','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### 🧠 Assumption\n{data.get('assumption','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"### ⚠️ Worst case reject\n{data.get('reject_reason','—')}"},
          ]
          card = json.dumps({
            "schema": "2.0",
            "body": {"direction": "vertical", "elements": elements}
          })
          payload = json.dumps({
            "receive_id": "${{ secrets.LARK_CHAT_ID }}",
            "msg_type": "interactive",
            "content": card
          }).encode()
          req = urllib.request.Request(
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id",
            data=payload,
            headers={
              "Authorization": "Bearer ${{ steps.token.outputs.token }}",
              "Content-Type": "application/json"
            }
          )
          res = urllib.request.urlopen(req).read().decode()
          print("AI Research Card sent:", res)
          PYEOF
