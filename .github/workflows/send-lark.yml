name: Send Judgment Card to Lark
on:
  push:
    paths:
      - 'data/form-judgment.json'
      - 'data/ai-research.json'
jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files
        id: changes
        run: |
          echo "judgment=$(git diff --name-only HEAD~1 HEAD | grep -c 'data/form-judgment.json')" >> $GITHUB_OUTPUT
          echo "research=$(git diff --name-only HEAD~1 HEAD | grep -c 'data/ai-research.json')" >> $GITHUB_OUTPUT

      - name: Get Lark Token
        id: token
        run: |
          RESPONSE=$(curl -s -X POST "https://open.larksuite.com/open-apis/auth/v3/tenant_access_token/internal" \
            -H "Content-Type: application/json" \
            -d "{\"app_id\":\"${{ secrets.LARK_APP_ID }}\",\"app_secret\":\"${{ secrets.LARK_APP_SECRET }}\"}")
          TOKEN=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['tenant_access_token'])")
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Send Judgment Card to Lark
        if: steps.changes.outputs.judgment != '0'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('data/form-judgment.json') as f:
            data = json.load(f)
          form = data.get('form', {})
          judgments = data.get('judgments', {})
          def jtext(field):
            jd = judgments.get(field)
            if not jd: return '_Chưa có đánh giá_'
            score = jd.get('score', '')
            summary = jd.get('summary', '')
            items = jd.get('items', '')
            return f"**{score}**\n{items}\n_{summary}_"
          elements = [
            {"tag": "markdown", "content": "## 📋 Hypothesis Card — Form + Judgment"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Segment:** {form.get('segment','—')}\n**Contact:** {form.get('contact_point','—')}\n**Confidence:** {form.get('confidence','—')}/5"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Vấn đề họ gặp:**\n{form.get('problem','—')}\n\n🤖 {jtext('problem')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Offer:**\n{form.get('offer','—')}\n\n🤖 {jtext('offer')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Signal / Evidence:**\n{form.get('signal','—')}\n\n🤖 {jtext('signal')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Assumption:**\n{form.get('assumption','—')}\n\n🤖 {jtext('assumption')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Worst case reject:**\n{form.get('reject_reason','—')}"},
          ]
          card = json.dumps({
            "schema": "2.0",
            "body": {"direction": "vertical", "elements": elements}
          })
          payload = json.dumps({
            "receive_id": "${{ secrets.LARK_CHAT_ID }}",
            "msg_type": "interactive",
            "content": card
          }).encode()
          req = urllib.request.Request(
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id",
            data=payload,
            headers={
              "Authorization": "Bearer ${{ steps.token.outputs.token }}",
              "Content-Type": "application/json"
            }
          )
          res = urllib.request.urlopen(req).read().decode()
          print("Judgment Card sent:", res)
          PYEOF

      - name: Send AI Research Card to Lark
        if: steps.changes.outputs.research != '0'
        run: |
          python3 << 'PYEOF'
          import json, urllib.request
          with open('data/ai-research.json') as f:
            data = json.load(f)
          elements = [
            {"tag": "markdown", "content": "## 🤖 AI Research Card — n8n Data"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Segment:** {data.get('segment','—')}\n**Contact:** {data.get('contact_point','—')}\n**Confidence:** {data.get('confidence_score','—')}/5"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Vấn đề họ gặp:**\n{data.get('problem','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Offer:**\n{data.get('offer','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Signal / Evidence:**\n{data.get('signal','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Assumption:**\n{data.get('assumption','—')}"},
            {"tag": "hr"},
            {"tag": "markdown", "content": f"**Worst case reject:**\n{data.get('reject_reason','—')}"},
          ]
          card = json.dumps({
            "schema": "2.0",
            "body": {"direction": "vertical", "elements": elements}
          })
          payload = json.dumps({
            "receive_id": "${{ secrets.LARK_CHAT_ID }}",
            "msg_type": "interactive",
            "content": card
          }).encode()
          req = urllib.request.Request(
            "https://open.larksuite.com/open-apis/im/v1/messages?receive_id_type=chat_id",
            data=payload,
            headers={
              "Authorization": "Bearer ${{ steps.token.outputs.token }}",
              "Content-Type": "application/json"
            }
          )
          res = urllib.request.urlopen(req).read().decode()
          print("AI Research Card sent:", res)
          PYEOF
